<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Shadow Princess</title>

<style>
/* =========================
   GLOBAL
========================= */
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: serif;
}

/* =========================
   BOOK STAGE
========================= */
#book-stage {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* =========================
   STATIC PAGE FRAME
   (this is your "Next Page.png")
========================= */
#book-page {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* =========================
   PAGE ZONES (LOCKED LAYOUT)
========================= */

/* COMMON PAGE SETTINGS */
.page {
    position: absolute;
    top: 16%;
    height: 70%;
    box-sizing: border-box;
    overflow: hidden;
    padding: 10px;
}

/* LEFT PAGE (SIDE A) */
#pageA {
    width: 21%;
    left: 28%;
}

/* RIGHT PAGE (SIDE B) */
#pageB {
    width: 19%;
    right: 30%;
}

/* =========================
   TYPOGRAPHY
========================= */

/* Chapter Number (LEFT ONLY) */
.chapter-number {
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    display: block;
}

/* Chapter Title (LEFT ONLY) */
.chapter-title {
    font-size: 15px;
    font-weight: bold;
    text-align: center;
    display: block;
}

/* Body Text (BOTH PAGES) */
.chapter-text {
    font-size: 12px;
    line-height: 1.6;
    text-align: left;
    white-space: normal;
}

/* =========================
   IMAGE MODE (FULL REPLACE)
========================= */
.page-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}
</style>
</head>

<body>

<div id="book-stage">

    <!-- STATIC BOOK FRAME -->
    <img id="book-page" src="images/Next Page.png" alt="Book Page">

    <!-- LEFT PAGE (SIDE A) -->
    <div id="pageA" class="page">

        <div class="chapter-number">Chapter 1</div>
        <div class="chapter-title">The Shadows</div>

        <div class="chapter-text">
            Left page text goes here.
        </div>

        <!-- IMAGE MODE EXAMPLE (hidden until used later)
        <img class="page-image" src="" />
        -->

    </div>

    <!-- RIGHT PAGE (SIDE B) -->
    <div id="pageB" class="page">

        <!-- NO CHAPTER HEADER HERE BY DESIGN -->

        <div class="chapter-text">
            Right page continuation text goes here.
        </div>

        <!-- IMAGE MODE EXAMPLE (hidden until used later)
        <img class="page-image" src="" />
        -->

    </div>

</div>

</body>
</html>
</body>
</html>
