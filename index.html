<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>The Shadow Princess</title>

    <link rel="stylesheet" href="css/style.css">

</head>


<body>


    <!-- Full Background Video -->
    <video
        id="background-video"
        src="assets/background.webm"
        autoplay
        loop
        muted
        playsinline>
    </video>



    <!-- Book Container -->
    <div id="book-container">

        <img
            id="spine"
            src="assets/spine.png"
            alt="The Shadow Princess Spine">


        <img
            id="front-cover"
            src="assets/front-cover.png"
            alt="The Shadow Princess Front Cover">

    </div>



    <script src="js/main.js"></script>


</body>

</html>
