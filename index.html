<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Shadow Princess</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: serif;
}

/* STAGE */
#book-stage {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* BOOK IMAGE */
#book-page {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* PAGE AREAS */
.page {
    position: absolute;
    top: 16%;
    height: 70%;
    box-sizing: border-box;
    overflow: hidden;
    padding: 14px;
}

/* LEFT PAGE */
#pageA {
    width: 21%;
    left: 28%;
}

/* RIGHT PAGE */
#pageB {
    width: 19%;
    right: 30%;
}

/* TYPOGRAPHY */
.chapter-number {
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    display: block;
    margin-bottom: 4px;
    color: white;
}

.chapter-title {
    font-size: 15px;
    font-weight: bold;
    text-align: center;
    display: block;
    margin-bottom: 10px;
    color: white;
}

.chapter-text {
    font-size: 12px;
    line-height: 1.6;
    text-align: left;
    white-space: normal;
    color: white;
}

/* IMAGE MODE */
.page-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

/* ARROWS */
.nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 40px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    z-index: 9999;
}

#btnPrev { left: 20px; }
#btnNext { right: 20px; }
</style>
</head>

<body>

<div id="book-stage">

    <!-- BOOK BACKGROUND IMAGE -->
    <img id="book-page"
         src="https://github.com/adequateremedy/The_Shadow_Princess_Digital_Book/blob/main/images/Next%20Page.png?raw=true"
         alt="Book Page">

    <!-- ARROWS -->
    <button id="btnPrev" class="nav-btn">◀</button>
    <button id="btnNext" class="nav-btn">▶</button>

    <!-- PAGE CONTAINERS -->
    <div id="pageA" class="page"></div>
    <div id="pageB" class="page"></div>

</div>

<!-- ENGINE SCRIPTS -->
<script src="book/loader.js"></script>
<script src="book/paginator.js"></script>
<script src="book/renderer.js"></script>
<script src="book/engine.js"></script>

</body>
</html>
