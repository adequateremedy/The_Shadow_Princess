<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>The Shadow Princess</title>

    <link rel="stylesheet" href="css/style.css">

</head>


<body>


    <!--
        Background Atmosphere Video

        Hidden until the spine is clicked.
        JavaScript will start the video,
        audio, and fade-in sequence.
    -->

    <video
        id="background-video"
        loop
        playsinline>

        <source
            src="assets/background.webm"
            type="video/webm">

    </video>



    <!--
        Main Book Container
    -->

    <div id="book">


        <!-- Closed Book Spine -->

        <img
            id="spine"
            src="assets/spine.png"
            alt="The Shadow Princess Spine">



        <!-- Front Cover -->

        <img
            id="front-cover"
            src="assets/front-cover.png"
            alt="The Shadow Princess Front Cover">



        <!-- Open Book Structure -->

        <div id="open-book">


            <!-- Inside Front Cover -->

            <div id="inside-front-cover">
            </div>



            <!-- Left Page Stack -->

            <div id="left-pages">
            </div>



            <!-- Right Page Stack -->

            <div id="right-pages">
            </div>



            <!-- Inside Back Cover -->

            <div id="inside-back-cover">
            </div>


        </div>



    </div>



    <script src="js/main.js"></script>


</body>

</html>
