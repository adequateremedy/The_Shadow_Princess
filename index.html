<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>The Shadow Princess</title>

    <link rel="stylesheet" href="css/style.css">

</head>


<body>


<!-- ==========================================
     BACKGROUND VIDEO
========================================== -->

<video id="background-video"
       playsinline
       preload="auto"
       loop>

    <source src="assets/background.webm"
            type="video/webm">

</video>



<!-- ==========================================
     BOOK
========================================== -->

<div id="book">



    <!-- ======================================
         CLOSED SPINE
    ======================================= -->

    <img id="spine"
         src="assets/spine.png"
         alt="Book Spine">





    <!-- ======================================
         FULL BOOK STRUCTURE
    ======================================= -->

    <div id="book-wrapper">



        <!-- ==================================
             OPEN BOOK BASE
        =================================== -->

        <div id="book-interior">



            <!-- LEFT SIDE
                 Inside Front Cover
            -->

            <div id="left-side">


                <div id="inside-front-cover"></div>


                <div id="left-page-stack"></div>


            </div>





            <!-- CENTER GUTTER -->

            <div id="book-gutter"></div>





            <!-- RIGHT SIDE
                 Inside Back Cover + Pages
            -->

            <div id="right-side">


                <div id="inside-back-cover"></div>


                <div id="right-page-stack">


                    <img id="toc-page"
                         src="assets/Table-of-Contents.png"
                         alt="Table of Contents">


                </div>


            </div>



        </div>






        <!-- ==================================
             FRONT HARD COVER
             THIS ROTATES OPEN
        =================================== -->

        <div id="front-cover-container">


            <img id="front-cover"
                 src="assets/front-cover.png"
                 alt="Front Cover">


        </div>



    </div>



</div>



<script src="js/main.js"></script>


</body>

</html>
