<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>The Shadow Princess</title>

    <link rel="stylesheet" href="css/style.css">

</head>


<body>


<!-- ==========================================
     BACKGROUND VIDEO
     Hidden until spine is clicked
========================================== -->

<video id="background-video"
       playsinline
       preload="auto"
       loop>

    <source src="assets/background.webm"
            type="video/webm">

</video>




<!-- ==========================================
     BOOK AREA
========================================== -->

<div id="book">



    <!-- ======================================
         SPINE BUTTON
         ONLY VISIBLE ON INITIAL LOAD
    ======================================= -->

    <img id="spine"
         src="assets/spine.png"
         alt="Book Spine">





    <!-- ======================================
         CLOSED BOOK
         FADES IN AFTER SPINE CLICK
    ======================================= -->

    <div id="closed-book">



        <img id="front-cover"
             src="assets/front-cover.png"
             alt="The Shadow Princess">



    </div>







    <!-- ======================================
         OPEN BOOK STRUCTURE
         EXISTS BUT HIDDEN UNTIL OPENED
    ======================================= -->

    <div id="open-book">





        <!-- LEFT SIDE
             Inside Front Cover
        -->

        <div id="left-page">


            <div id="inside-front-cover"></div>


            <div id="left-pages"></div>


        </div>






        <!-- RIGHT SIDE
             Inside Back Cover + TOC
        -->

        <div id="right-page">


            <div id="inside-back-cover"></div>


            <div id="right-pages">


                <img id="table-of-contents"
                     src="assets/Table-of-Contents.png"
                     alt="Table of Contents">


            </div>


        </div>





        <!-- FRONT HARD COVER
             ROTATES OPEN
        -->

        <div id="hard-cover">


            <img src="assets/front-cover.png"
                 alt="Front Cover">


        </div>



    </div>



</div>




<script src="js/main.js"></script>


</body>

</html>
